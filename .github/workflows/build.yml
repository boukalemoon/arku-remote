name: Build & Release

on:
  push:
    tags:
      - 'v*'
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:
    inputs:
      draft:
        description: 'Draft release'
        type: boolean
        default: true

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: win
            artifact_glob: 'dist_electron/*.exe'
            name: Windows
          - os: macos-latest
            platform: mac
            artifact_glob: 'dist_electron/*.dmg'
            name: macOS
          - os: ubuntu-latest
            platform: linux
            artifact_glob: 'dist_electron/*.AppImage'
            name: Linux

    runs-on: ${{ matrix.os }}
    name: Build — ${{ matrix.name }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # Linux: electron-builder için gerekli sistem paketleri
      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libnss3-dev \
            libatk1.0-dev \
            libatk-bridge2.0-dev \
            libcups2-dev \
            libdrm-dev \
            libxkbcommon-dev \
            libxcomposite-dev \
            libxdamage-dev \
            libxrandr-dev \
            libgbm-dev \
            libpango1.0-dev \
            libcairo2-dev \
            libasound2-dev

      - name: Install dependencies
        run: npm ci

      - name: Build React app
        run: npm run build

      - name: Build Electron — ${{ matrix.name }}
        run: npm run desktop:build:${{ matrix.platform }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # macOS: kod imzalama olmadan Gatekeeper uyarısı görünür.
          # Sertifika eklemek için CSC_LINK ve CSC_KEY_PASSWORD secret'larını tanımlayın.
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.platform }}
          path: |
            dist_electron/*.exe
            dist_electron/*.dmg
            dist_electron/*.zip
            dist_electron/*.AppImage
            dist_electron/*.deb
            dist_electron/*.snap
          if-no-files-found: warn
          retention-days: 7

  # Tüm platformlar build tamamlandıktan sonra GitHub Release oluştur
  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    name: Publish Release

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          merge-multiple: true

      - name: List artifacts
        run: ls -la release-artifacts/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          draft: ${{ github.event.inputs.draft == 'true' }}
          generate_release_notes: true
          files: release-artifacts/*
          body: |
            ## Arku Remote ${{ github.ref_name }}

            ### İndirme
            | Platform | Dosya |
            |----------|-------|
            | Windows  | `Arku-Remote-Setup-*.exe` (kurulum) veya `Arku-Remote-*.exe` (portable) |
            | macOS    | `Arku-Remote-*.dmg` |
            | Linux    | `Arku-Remote-*.AppImage` veya `Arku-Remote-*.deb` |

            ### macOS Notu
            Uygulama kod imzalı değildir. İlk açılışta: **Sağ tık → Aç** yapın.

            ### Linux Notu
            AppImage dosyasını çalıştırılabilir yapın:
            ```bash
            chmod +x Arku-Remote-*.AppImage
            ./Arku-Remote-*.AppImage
            ```
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
