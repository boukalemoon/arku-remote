# TURN Server configuration for Yırak Remote
# Generated: 2026-04-20

# ====================
# LISTENING PORTS
# ====================
listening-port=3478
listening-ip=0.0.0.0

# Public IP for external connectivity
# IMPORTANT: Değiştir - YOUR_PUBLIC_IP veya docker-compose ile otomatik
external-ip=127.0.0.1/127.0.0.1

# ====================
# REALM & CREDENTIALS
# ====================
# Realm ismesi
realm=turn.yirak.local
server-name=turn.yirak.local

# Username:password format
# Formatı: username:password[:realm]
user=turnuser:turnpass123

# ====================
# SECURITY SETTINGS
# ====================
# Fingerprint authentication (WebRTC için gerekli)
fingerprint

# Message integrity check
message-integrity

# ====================
# PERFORMANCE
# ====================
# Capacity settings
bps-capacity=0
max-bps=0
max-sessions=0

# ====================
# LOGGING
# ====================
log-file=/var/log/coturn/turnserver.log
log-file-max=10M
verbose

# ====================
# ADVANCED SETTINGS
# ====================
# Capacity per IP
# max-bps-per-flow=0

# Bandwidth settings
# bitrate-cap=0

# Use TURN with WebRTC
# No-auth for test (değiştir production için)
# no-auth

# ====================
# Optional: TLS Support
# ====================
# cert=/etc/coturn/cert.pem
# pkey=/etc/coturn/pkey.pem
# tls-listening-port=5349

# ====================
# Connection settings
# ====================
# Max connection time (0 = unlimited)
# max-lifetime=3600

# Keep-alive interval
# keep-address-family

# ====================
# STUN Server (Not required, but helpful)
# ====================
# STUN port (same as listening-port)
# stun-port=3478
